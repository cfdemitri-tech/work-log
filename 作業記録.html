<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>作業記録</title>
<style>
  :root {
    --ink: #2b2a27;
    --ink-soft: #6b6a64;
    --paper: #f2efe6;
    --paper-line: #d8d3c3;
    --rail: #8a2f2f;
    --rail-soft: #b96a5a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: Georgia, "Yu Mincho", serif;
    padding: 24px 16px 80px;
  }
  h1 {
    font-size: 22px;
    font-weight: normal;
    letter-spacing: 0.05em;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 10px;
    margin: 0 0 4px;
  }
  .sub {
    font-size: 12px;
    color: var(--ink-soft);
    margin: 0 0 20px;
    font-family: "Courier New", monospace;
  }
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }
  button {
    font-family: "Courier New", monospace;
    font-size: 13px;
    background: transparent;
    border: 1px solid var(--ink);
    color: var(--ink);
    padding: 8px 14px;
    cursor: pointer;
    letter-spacing: 0.03em;
  }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--rail); color: #fdf9f0; border-color: var(--rail); }
  button.ghost { border-color: var(--paper-line); color: var(--ink-soft); }

  #form-area {
    background: #fdfaf2;
    border: 1px solid var(--paper-line);
    border-left: 4px solid var(--rail);
    padding: 18px;
    margin-bottom: 24px;
    display: none;
  }
  #form-area.open { display: block; }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--ink-soft);
    font-family: "Courier New", monospace;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .field input, .field textarea {
    width: 100%;
    font-family: Georgia, serif;
    font-size: 14px;
    padding: 8px;
    border: 1px solid var(--paper-line);
    background: #fff;
    color: var(--ink);
  }
  .field textarea { min-height: 60px; resize: vertical; }
  .row2 { display: flex; gap: 10px; }
  .row2 .field { flex: 1; }
  .save-line { display: flex; gap: 8px; margin-top: 6px; }

  .entry {
    position: relative;
    padding: 14px 14px 14px 18px;
    margin-bottom: 14px;
    background: #fdfaf2;
    border: 1px solid var(--paper-line);
  }
  .entry::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--rail-soft);
  }
  .entry .date {
    font-family: "Courier New", monospace;
    font-size: 12px;
    color: var(--rail);
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  .entry .meta {
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 8px;
    font-family: "Courier New", monospace;
  }
  .entry .body { font-size: 14px; line-height: 1.7; white-space: pre-wrap; margin-bottom: 6px; }
  .entry .quote {
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    border-left: 2px solid var(--paper-line);
    padding-left: 10px;
    margin: 8px 0;
    color: var(--ink);
  }
  .entry .actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }
  .entry .actions button {
    font-size: 11px;
    padding: 4px 10px;
  }
  #empty {
    text-align: center;
    color: var(--ink-soft);
    font-size: 13px;
    padding: 40px 0;
    font-family: "Courier New", monospace;
  }
  #status {
    font-size: 11px;
    color: var(--ink-soft);
    font-family: "Courier New", monospace;
    margin-top: 30px;
    text-align: center;
  }
</style>
</head>
<body>

<h1>作業記録</h1>
<p class="sub">日付・状況・発言をそのまま残す帳面</p>

<div class="toolbar">
  <button class="primary" id="btn-new">＋ 今日の記録を追加</button>
  <button class="ghost" id="btn-export">全部コピー</button>
</div>

<div id="form-area">
  <div class="field">
    <label>日付</label>
    <input type="date" id="f-date">
  </div>
  <div class="row2">
    <div class="field">
      <label>気温 / 天候</label>
      <input type="text" id="f-weather" placeholder="例: 37℃ 直射日光下">
    </div>
    <div class="field">
      <label>場所</label>
      <input type="text" id="f-place" placeholder="現場名など">
    </div>
  </div>
  <div class="field">
    <label>出来事</label>
    <textarea id="f-event" placeholder="何があったか、時系列で"></textarea>
  </div>
  <div class="field">
    <label>発言・指示の内容(誰が・何を言ったか)</label>
    <textarea id="f-quote" placeholder="できるだけ本人の言葉に近い形で"></textarea>
  </div>
  <div class="row2">
    <div class="field">
      <label>始業〜終業</label>
      <input type="text" id="f-hours" placeholder="例: 8:00〜17:00 休憩1h">
    </div>
    <div class="field">
      <label>証拠</label>
      <input type="text" id="f-evidence" placeholder="写真 / スクショ / 目撃者など">
    </div>
  </div>
  <div class="field">
    <label>備考</label>
    <textarea id="f-note" placeholder="その他気になったこと"></textarea>
  </div>
  <div class="save-line">
    <button class="primary" id="btn-save">保存する</button>
    <button class="ghost" id="btn-cancel">やめる</button>
  </div>
</div>

<div id="list"></div>
<div id="empty">まだ記録がありません。「今日の記録を追加」から始めてください。</div>
<div id="status">読み込み中…</div>

<script>
const KEY = 'work-log-entries';
let entries = [];
let editingId = null;

function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0,10);
}

async function loadEntries() {
  try {
    const res = await window.storage.get(KEY, false);
    entries = res ? JSON.parse(res.value) : [];
  } catch (e) {
    entries = [];
  }
  render();
}

async function saveEntries() {
  try {
    await window.storage.set(KEY, JSON.stringify(entries), false);
    document.getElementById('status').textContent = '保存済み';
  } catch (e) {
    document.getElementById('status').textContent = '保存に失敗しました(このセッション内のみ表示されます)';
  }
}

function openForm(entry) {
  document.getElementById('form-area').classList.add('open');
  if (entry) {
    editingId = entry.id;
    document.getElementById('f-date').value = entry.date || '';
    document.getElementById('f-weather').value = entry.weather || '';
    document.getElementById('f-place').value = entry.place || '';
    document.getElementById('f-event').value = entry.event || '';
    document.getElementById('f-quote').value = entry.quote || '';
    document.getElementById('f-hours').value = entry.hours || '';
    document.getElementById('f-evidence').value = entry.evidence || '';
    document.getElementById('f-note').value = entry.note || '';
  } else {
    editingId = null;
    document.getElementById('f-date').value = todayStr();
    ['f-weather','f-place','f-event','f-quote','f-hours','f-evidence','f-note'].forEach(id => {
      document.getElementById(id).value = '';
    });
  }
}

function closeForm() {
  document.getElementById('form-area').classList.remove('open');
  editingId = null;
}

async function handleSave() {
  const date = document.getElementById('f-date').value || todayStr();
  const data = {
    id: editingId || (Date.now().toString(36)),
    date,
    weather: document.getElementById('f-weather').value.trim(),
    place: document.getElementById('f-place').value.trim(),
    event: document.getElementById('f-event').value.trim(),
    quote: document.getElementById('f-quote').value.trim(),
    hours: document.getElementById('f-hours').value.trim(),
    evidence: document.getElementById('f-evidence').value.trim(),
    note: document.getElementById('f-note').value.trim(),
  };
  if (editingId) {
    const idx = entries.findIndex(e => e.id === editingId);
    if (idx >= 0) entries[idx] = data;
  } else {
    entries.push(data);
  }
  entries.sort((a,b) => b.date.localeCompare(a.date));
  await saveEntries();
  closeForm();
  render();
}

async function handleDelete(id) {
  entries = entries.filter(e => e.id !== id);
  await saveEntries();
  render();
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render() {
  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  if (!entries.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = entries.map(e => {
    const metaParts = [];
    if (e.weather) metaParts.push(e.weather);
    if (e.place) metaParts.push(e.place);
    if (e.hours) metaParts.push(e.hours);
    return `
      <div class="entry" data-id="${e.id}">
        <div class="date">${escapeHtml(e.date)}</div>
        ${metaParts.length ? `<div class="meta">${escapeHtml(metaParts.join(' ・ '))}</div>` : ''}
        ${e.event ? `<div class="body">${escapeHtml(e.event)}</div>` : ''}
        ${e.quote ? `<div class="quote">${escapeHtml(e.quote)}</div>` : ''}
        ${e.evidence ? `<div class="meta">証拠: ${escapeHtml(e.evidence)}</div>` : ''}
        ${e.note ? `<div class="meta">備考: ${escapeHtml(e.note)}</div>` : ''}
        <div class="actions">
          <button class="ghost btn-edit">編集</button>
          <button class="ghost btn-delete">削除</button>
        </div>
      </div>
    `;
  }).join('');

  list.querySelectorAll('.entry').forEach(el => {
    const id = el.getAttribute('data-id');
    el.querySelector('.btn-edit').addEventListener('click', () => {
      const entry = entries.find(e => e.id === id);
      openForm(entry);
      window.scrollTo({top: 0, behavior: 'smooth'});
    });
    el.querySelector('.btn-delete').addEventListener('click', () => {
      if (confirm('この記録を削除しますか?')) handleDelete(id);
    });
  });
}

function exportText() {
  if (!entries.length) {
    alert('記録がまだありません。');
    return;
  }
  const text = entries.map(e => {
    const lines = [`■ ${e.date}`];
    const metaParts = [];
    if (e.weather) metaParts.push(`気温/天候: ${e.weather}`);
    if (e.place) metaParts.push(`場所: ${e.place}`);
    if (e.hours) metaParts.push(`時間: ${e.hours}`);
    if (metaParts.length) lines.push(metaParts.join(' / '));
    if (e.event) lines.push(`出来事: ${e.event}`);
    if (e.quote) lines.push(`発言: ${e.quote}`);
    if (e.evidence) lines.push(`証拠: ${e.evidence}`);
    if (e.note) lines.push(`備考: ${e.note}`);
    return lines.join('\n');
  }).join('\n\n');

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      alert('全記録をコピーしました。');
    }).catch(() => {
      prompt('コピーできなかったので、下のテキストを手動でコピーしてください:', text);
    });
  } else {
    prompt('下のテキストを手動でコピーしてください:', text);
  }
}

document.getElementById('btn-new').addEventListener('click', () => openForm(null));
document.getElementById('btn-cancel').addEventListener('click', closeForm);
document.getElementById('btn-save').addEventListener('click', handleSave);
document.getElementById('btn-export').addEventListener('click', exportText);

loadEntries();
</script>

</body>
</html>
